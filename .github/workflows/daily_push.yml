name: Daily Dev Log

on:
  schedule:
    # Runs at 18:30 UTC = 12:00 AM IST every day
    - cron: '30 18 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-dev-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate daily log entry
        run: python scripts/generate_log.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev_log.md
          git diff --cached --quiet || git commit -m "dev: daily log update $(date +'%Y-%m-%d')"
          git push
