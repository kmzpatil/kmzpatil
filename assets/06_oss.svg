<svg viewBox="0 0 1000 185" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root { 
      --bg: #0d1117; 
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #1F8ACB; 
      --accent-glow: #00f0ff;
      --line: #30363d;
    }
    .mono { font-family: "Cascadia Code", "Fira Code", Consolas, "SF Mono", monospace; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    
    /* Animations */
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.2s ease-out forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    
    .rise { opacity: 0; animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes rise { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    .fade { opacity: 0; animation: fade 1s ease forwards; }
    @keyframes fade { to { opacity: 1; } }

    /* Delays */
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.3s; }
    .d3 { animation-delay: 0.5s; }
    .d4 { animation-delay: 0.7s; }
    .d5 { animation-delay: 0.9s; }
  </style>
  
  <rect width="100%" height="100%" fill="var(--bg)" rx="8"/>
  
  <g class="fade d1 mono">
    <text x="40" y="60" font-size="36" font-weight="bold" fill="var(--accent-glow)">06</text>
    <text x="96" y="52" font-size="16" letter-spacing="4" fill="var(--text-main)" font-weight="bold"><tspan>F E A T U R E D</tspan><tspan dx="24">P R O J E C T S</tspan></text>
    <line class="draw d1" x1="633" y1="46" x2="960" y2="46" stroke="var(--line)" stroke-width="1"/>
  </g>
<text class="sans rise d2" fill="var(--text-main)" x="40" y="120" font-size="14" font-weight="normal">19+ active repositories across C++, Python, and Web architectures.</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="145" font-size="14" font-weight="normal">View them all below or at github.com/kmzpatil</text>
</svg>