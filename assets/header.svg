<svg viewBox="0 0 1000 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root { 
      --bg: #ffffff; 
      --text-main: #333333;
      --text-muted: #666666;
      --accent: #1F8ACB; 
      --line: #e0e0e0;
    }
    @media (prefers-color-scheme: dark) { 
      :root { 
        --bg: #0d1117; 
        --text-main: #c9d1d9;
        --text-muted: #8b949e;
        --accent: #00f0ff; 
        --line: #30363d;
      } 
    }
    .mono { font-family: "Cascadia Code", "Fira Code", Consolas, "SF Mono", monospace; }
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.5s ease forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .rise { opacity: 0; animation: rise 1s ease forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(15px); } to { opacity:1;transform:translateY(0); } }
    .fade { opacity: 0; animation: fade 1s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    .a1{animation-delay:0.2s} .a2{animation-delay:0.5s} .a3{animation-delay:0.8s} .a4{animation-delay:1.1s} .a5{animation-delay:1.4s}
  </style>
  <rect width="100%" height="100%" fill="var(--bg)" rx="8"/>
  
  <line class="draw a1" x1="48" y1="58" x2="952" y2="58" stroke="var(--accent)" stroke-width="2"/>
  <g class="fade a1 mono" font-size="12" letter-spacing="2" fill="var(--text-muted)">
    <text x="48" y="44">KARTIK PATIL — INIT</text>
    <text x="952" y="44" text-anchor="end">SYS.VER: 1.0.0</text>
  </g>
  <text class="mono rise a2" fill="var(--text-main)" x="48" y="140" font-size="48" font-weight="bold">Kartik Patil</text>
  <text class="mono rise a2" fill="var(--text-muted)" x="48" y="180" font-size="18" font-weight="normal">Software Engineer | C++ & Full-Stack Systems</text>
  <text class="mono rise a3" fill="var(--text-main)" x="48" y="240" font-size="14" font-weight="normal">> _focus:    Low-Latency C++ · Scalable Backend Architectures</text>
  <text class="mono rise a3" fill="var(--text-main)" x="48" y="270" font-size="14" font-weight="normal">> _status:   Building high-performance systems</text>
  <line class="draw a4" x1="48" y1="330" x2="952" y2="330" stroke="var(--line)" stroke-width="1"/>

</svg>