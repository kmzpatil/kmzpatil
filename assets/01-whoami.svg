<svg viewBox="0 0 1000 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root { 
      --bg: #ffffff; 
      --text-main: #333333;
      --text-muted: #666666;
      --accent: #1F8ACB; 
      --line: #e0e0e0;
    }
    @media (prefers-color-scheme: dark) { 
      :root { 
        --bg: #0d1117; 
        --text-main: #c9d1d9;
        --text-muted: #8b949e;
        --accent: #00f0ff; 
        --line: #30363d;
      } 
    }
    .mono { font-family: "Cascadia Code", "Fira Code", Consolas, "SF Mono", monospace; }
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.5s ease forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .rise { opacity: 0; animation: rise 1s ease forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(15px); } to { opacity:1;transform:translateY(0); } }
    .fade { opacity: 0; animation: fade 1s ease forwards; }
    @keyframes fade { to { opacity: 1; } }
    .a1{animation-delay:0.2s} .a2{animation-delay:0.5s} .a3{animation-delay:0.8s} .a4{animation-delay:1.1s} .a5{animation-delay:1.4s}
  </style>
  <rect width="100%" height="100%" fill="var(--bg)" rx="8"/>
  
  <g class="fade a1 mono" fill="var(--accent)">
    <text x="48" y="60" font-size="32" font-weight="bold">01</text>
    <text x="96" y="55" font-size="14" letter-spacing="3" fill="var(--text-main)">W H O A M I</text>
    <line class="draw a1" x1="265" y1="50" x2="952" y2="50" stroke="var(--line)" stroke-width="1"/>
  </g>
<text class="mono rise a2" fill="var(--text-main)" x="48" y="120" font-size="14" font-weight="normal">Student at Vellore Institute of Technology, Chennai.</text><text class="mono rise a3" fill="var(--text-main)" x="48" y="150" font-size="14" font-weight="normal">Driven by elegant architecture, robust systems, and writing precise, optimized code.</text>
</svg>