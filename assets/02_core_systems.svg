<svg viewBox="0 0 1000 877" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root { 
      --bg: #0d1117; 
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #1F8ACB; 
      --accent-glow: #00f0ff;
      --line: #30363d;
    }
    .mono { font-family: "Cascadia Code", "Fira Code", Consolas, "SF Mono", monospace; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    
    /* Animations */
    .draw { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 1.2s ease-out forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    
    .rise { opacity: 0; animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes rise { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    .fade { opacity: 0; animation: fade 1s ease forwards; }
    @keyframes fade { to { opacity: 1; } }

    /* Delays */
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.3s; }
    .d3 { animation-delay: 0.5s; }
    .d4 { animation-delay: 0.7s; }
    .d5 { animation-delay: 0.9s; }
  </style>
  
  <rect width="100%" height="100%" fill="var(--bg)" rx="8"/>
  
  <g class="fade d1 mono">
    <text x="40" y="60" font-size="36" font-weight="bold" fill="var(--accent-glow)">02</text>
    <text x="96" y="52" font-size="16" letter-spacing="4" fill="var(--text-main)" font-weight="bold">C O R E   S Y S T E M S</text>
    <line class="draw d1" x1="473" y1="46" x2="960" y2="46" stroke="var(--line)" stroke-width="1"/>
  </g>
<text class="mono rise d2" fill="var(--text-main)" x="40" y="120" font-size="18" font-weight="bold">Multithreaded Order Book Matching Engine</text><text class="mono rise d2" fill="var(--accent)" x="40" y="145" font-size="13" font-weight="normal">Low-Latency C++ Systems</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="175" font-size="13" font-weight="normal">▸ Matching engine processing concurrent orders via thread-safe mutex-protected single-consumer queue</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="197" font-size="13" font-weight="normal">  handling 10,000+ msgs/sec.</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="224" font-size="13" font-weight="normal">▸ Concurrent state management using condition variable for blocking pops and an atomic engine flag for</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="246" font-size="13" font-weight="normal">  zero-leak teardowns.</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="273" font-size="13" font-weight="normal">▸ Price-time priority order matching using std::map with std::greater. Optimized critical paths for sub-</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="295" font-size="13" font-weight="normal">  microsecond processing, reducing p99 latency by 40%.</text><text class="mono rise d4" fill="var(--line)" x="40" y="337" font-size="12" font-weight="normal">[C++ · Multithreading · CMake · Google Benchmarks]</text><text class="mono rise d2" fill="var(--text-main)" x="40" y="387" font-size="18" font-weight="bold">Mini-Compiler</text><text class="mono rise d2" fill="var(--accent)" x="40" y="412" font-size="13" font-weight="normal">Compiler Design from Scratch</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="442" font-size="13" font-weight="normal">▸ Assembled C++ compiler pipeline translating source code into bytecode for a stack-based virtual machine,</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="464" font-size="13" font-weight="normal">  compiling 10K+ lines/sec.</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="491" font-size="13" font-weight="normal">▸ Constructed recursive descent Lexer and Parser from scratch to tokenize 5 core keywords and execute</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="513" font-size="13" font-weight="normal">  syntax checking.</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="540" font-size="13" font-weight="normal">▸ Implemented comprehensive support for 18+ operators in AST visitors. Built stack-based VM optimizing</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="562" font-size="13" font-weight="normal">  memory management for 50%+ quicker runs.</text><text class="mono rise d4" fill="var(--line)" x="40" y="604" font-size="12" font-weight="normal">[C++ · CMake]</text><text class="mono rise d2" fill="var(--text-main)" x="40" y="654" font-size="18" font-weight="bold">Real-Time Autocomplete Engine</text><text class="mono rise d2" fill="var(--accent)" x="40" y="679" font-size="13" font-weight="normal">High-Performance Data Structures</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="709" font-size="13" font-weight="normal">▸ C++ top-k suggestion system providing predictive completions for 1.2M+ entries.</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="736" font-size="13" font-weight="normal">▸ Memory-efficient Radix Tries with per-node top-K caching indexing 500,000+ word vocabularies.</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="763" font-size="13" font-weight="normal">▸ Interactive terminal interface capturing dynamic keystrokes to benchmark latency. Optimized string</text><text class="sans rise d3" fill="var(--text-muted)" x="40" y="785" font-size="13" font-weight="normal">  matching for 10K+ QPS throughput, achieving sub-millisecond lookup for 10M+ queries.</text><text class="mono rise d4" fill="var(--line)" x="40" y="827" font-size="12" font-weight="normal">[C++ · CMake]</text>
</svg>